<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Gif</title>
<style>
body{font-family:Arial;background:#f4f6f8;padding:16px}
.card{background:white;padding:16px;border-radius:14px}
input,textarea,button{width:100%;padding:14px;margin:8px 0;font-size:18px}
button{background:#222;color:white;border:0;border-radius:10px}
</style>
<link rel="stylesheet" href="/style.css">
</head>
<body>

<a href="/">⬅ Home</a>

<div class="card">
<h2>🧪 Gif</h2><p>Wat is gelaai en hoeveel?</p>

<input id="date" type="date">

<textarea id="wat" placeholder="Wat is gelaai en hoeveel (bv: Roundup 20L + Atrazine 5L)"></textarea>

<button onclick="save()">Save</button>

<p id="msg"></p>
</div>

<script>
date.value = new Date().toISOString().split('T')[0];

async function save(){
  msg.textContent='Saving...';

  const res = await fetch('/api/gif',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({
      date:date.value,
      wat:wat.value
    })
  });

  if(res.ok){
    msg.textContent='✅ Saved';
    wat.value='';
  }else{
    msg.textContent='❌ Error saving';
  }
}
</script>

</body>
</html>

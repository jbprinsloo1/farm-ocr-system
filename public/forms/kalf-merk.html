<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Kalf merk</title>
<style>
body{font-family:Arial;background:#f4f6f8;padding:16px}
.card{background:white;padding:16px;border-radius:14px}
input,select,button{width:100%;padding:14px;margin:8px 0;font-size:18px}
button{background:#222;color:white;border:0;border-radius:10px}
</style>
</head>
<body>
<a href="/">⬅ Home</a>
<div class="card">
<h2>🐄 Kalf merk</h2>

<input id="date" type="date">
<input id="koeiNr" type="text" placeholder="Koei nr">
<input id="kalfNr" type="text" placeholder="Kalf nr">

<select id="waar">
<option>Susanasrus</option>
<option>Eben</option>
<option>Berlyn</option>
<option>Hartbeeslaagte</option>
<option>Rooibloem</option>
<option>Welverdient</option>
<option>Doornpoort Oos</option>
<option>Doornpoort Wes</option>
<option>Skoolspruit</option>
<option>Verblyden</option>
<option>Jarama</option>
<option>Kromkuil</option>
<option>Goedehoop</option>
<option>Uitkoms</option>
<option>Rietvlei</option>
<option>Lizea</option>
<option>Boomplaas</option>
</select>

<select id="nr">
<option value="">Kamp nr</option>
<option>1</option><option>2</option><option>3</option><option>4</option><option>5</option>
<option>6</option><option>7</option><option>8</option><option>9</option><option>10</option>
<option>11</option><option>12</option><option>13</option><option>14</option><option>15</option>
<option>16</option><option>17</option><option>18</option><option>19</option><option>20</option>
<option>21</option><option>22</option><option>23</option><option>24</option><option>25</option>
<option>26</option><option>27</option><option>28</option><option>29</option><option>30</option>
</select>

<select id="size">
<option>Normaal</option>
<option>Klein</option>
<option>Te Groot</option>
</select>

<button onclick="save()">Save</button>
<p id="msg"></p>
</div>

<script>
date.value = new Date().toISOString().split('T')[0];

async function save(){
  msg.textContent='Saving...';

  const res = await fetch('/api/kalf-merk',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({
      date:date.value,
      koeiNr:koeiNr.value,
      kalfNr:kalfNr.value,
      waar:waar.value,
      nr:nr.value,
      size:size.value
    })
  });

  if(res.ok){
    msg.textContent='✅ Saved';
    koeiNr.value='';
    kalfNr.value='';
  }else{
    msg.textContent='❌ Error saving';
  }
}
</script>
</body>
</html>

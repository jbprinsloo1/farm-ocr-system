<!DOCTYPE html>
<html>
<head>
  <title>Farm OCR Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body { font-family: Arial, sans-serif; padding: 16px; background: #f5f5f5; }
    .card { background: white; padding: 16px; margin-bottom: 12px; border-radius: 10px; }
    .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    table { width: 100%; border-collapse: collapse; background: white; }
    th, td { padding: 10px; border-bottom: 1px solid #ddd; text-align: left; }
    th { background: #eee; }
    a { display: inline-block; margin-bottom: 16px; }
  </style>
</head>
<body>
  <a href="/">← Back to Scan</a>
  <h2>Farm OCR Dashboard</h2>

  <div class="grid">
    <div class="card"><b>Total Loads</b><h2 id="loads">...</h2></div>
    <div class="card"><b>Total Tons</b><h2 id="weight">...</h2></div>
    <div class="card"><b>Avg Moisture</b><h2 id="moisture">...</h2></div>
  </div>

  <h3>Tons per Land</h3>
  <table>
    <thead>
      <tr>
        <th>Land</th>
        <th>Loads</th>
        <th>Tons</th>
      </tr>
    </thead>
    <tbody id="landRows"></tbody>
  </table>

  <script>
    async function loadDashboard() {
      const res = await fetch('/api/dashboard');
      const data = await res.json();

      document.getElementById('loads').textContent = data.totalLoads;
      document.getElementById('weight').textContent = data.totalWeight + ' t';
      document.getElementById('moisture').textContent = data.averageMoisture + '%';

      document.getElementById('landRows').innerHTML = data.byLand.map(row => `
        <tr>
          <td>${row.land}</td>
          <td>${row.loads}</td>
          <td>${Number(row.weight).toFixed(3)}</td>
        </tr>
      `).join('');
    }

    loadDashboard();
  </script>
</body>
</html>

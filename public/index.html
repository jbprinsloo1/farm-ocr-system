<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Farm App</title>
<link rel="stylesheet" href="/style.css">
</head>
<body>

<h1>🚜 Plaas App</h1>

<div class="section">
  <a class="main-btn" onclick="showEntry()">📥 Data Entry</a>
  <a class="main-btn" onclick="showDashboard()">📊 Data Dashboard</a>
</div>

<div id="entry" class="section" style="display:none">
  <h2>📥 Data Entry</h2>
  <a href="/scan.html">📷 Senwes Scan</a>
  <a class="small" href="/forms/kalf-merk.html">🐄 Kalf merk</a>
  <a class="small" href="/forms/bees-minus.html">➖ Bees minus</a>
  <a class="small" href="/forms/bees-plus.html">➕ Bees plus</a>
  <a class="small" href="/forms/reen.html">🌧️ Reën</a>
  <a class="small" href="/forms/trokke.html">🚚 Trokke</a>
  <a class="small" href="/forms/gif.html">🧪 Gif</a>
  <a class="small" href="/forms/ander.html">📝 Ander</a>
</div>

<div id="dashboard" class="section" style="display:none">
  <h2>📊 Data Dashboard</h2>
  <a href="/dashboard.html">🔎 Cow Lookup</a>
  <a class="small" href="/cow-productivity.html">🐄 Cow Productivity Tracker</a>
  <a class="small" href="/rain-dashboard.html">🌧️ Rainfall totals</a>
  <a class="small" href="/senwes-dashboard.html">🌾 Senwes tonnes</a>
  <a class="small" href="/trokke-slips.html">🚚 Trokke slips</a>
</div>

<script>
function showEntry(){
  document.getElementById('entry').style.display='block';
  document.getElementById('dashboard').style.display='none';
}
function showDashboard(){
  document.getElementById('dashboard').style.display='block';
  document.getElementById('entry').style.display='none';
}
</script>

</body>
</html>
